<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Horizon</title>
    <link rel="stylesheet" href="reset.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <script>
        const token = localStorage.getItem('token');
        if (token == null)
            window.location.href = '/index.html';
    </script>
</head>
<body class="d-flex flex-column align-items-center justify-content-center
             vw-100 vh-100 bg-dark-subtle">


    <main class="w-100 h-100 d-flex flex-column justify-content-center">
        
        <section class="w-25 h-50 d-flex flex-column justify-self-center align-self-center">
            <button class="w-50 align-self-center btn btn-dark" 
                    onclick="ShowUsers()">Atualizar Lista de Users</button>
            
            <table class="mt-4 align-self-center table border border-dark-subtle rounded-5">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Email</th>
                        <th>Senha</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                </tbody>
            </table>
        </section>

        <section class="w-25 d-flex flex-column justify-self-center align-self-center">

            <div class="btn-group" role="group" aria-label="Basic mixed styles example">
                <button type="button" class="btn btn-danger" data-bs-toggle="modal" data-bs-target="#deleteUserModal">Deletar</button>
                <button type="button" class="btn btn-warning">Atualizar</button>
                <button type="button" class="btn btn-success" data-bs-toggle="modal" data-bs-target="#createUserModal">Criar</button>
            </div>

            <div class="modal fade" id="deleteUserModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
                <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h1 class="modal-title fs-5" id="exampleModalLabel">Deletar Usuário</h1>
                        </div>
                        <div class="modal-body d-flex flex-column align-items-center">
                            <label>Digite o email do usuário que deseja apagar:</label>
                            <input id="userEmailInput" type="text" placeholder="Email" class="bg-transparent border-0 border-bottom border-dark-subtle">
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                            <button type="button" class="btn btn-primary" onclick="DeleteUser()">Salvar</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="modal fade" id="createUserModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
                <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h1 class="modal-title fs-5" id="exampleModalLabel">Criar usuário</h1>
                        </div>
                        <div class="modal-body d-flex flex-column align-items-center">
                            <label>Digite o email do usuário que deseja cadastrar:</label>
                            <input id="userEmailCreate" type="text" placeholder="Email" class="bg-transparent border-0 border-bottom border-dark-subtle">
                            
                            <label class="mt-4">Digite a senha do usuário que deseja cadastrar:</label>
                            <input id="userPasswordCreate" type="password" placeholder="Senha" class="bg-transparent border-0 border-bottom border-dark-subtle">
                            <div class="form-check form-switch mt-2">
                                <input class="form-check-input" type="checkbox" role="switch" id="showPassword"
                                    onchange="
                                        const passwordInput = document.getElementById('userPasswordCreate');
                                        
                                        passwordInput.type = (this.checked) ? 'text' : 'password';">
                                <label class="form-check-label" for="showPassword">Mostrar senha</label>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                            <button type="button" class="btn btn-primary" onclick="CreateUser('userEmailCreate', 'userPasswordCreate')">Salvar</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="app.js"></script>
</body>
</html>
