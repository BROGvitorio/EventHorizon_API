<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Horizon</title>
    <link rel="stylesheet" href="reset.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body id="main-page">
    
    <div class="d-flex align-content-center justify-content-center flex-wrap
             vw-100 vh-100 bg-dark-subtle">
        <main class="d-flex flex-column align-content-center justify-content-center
                w-25 h-50 bg-light shadow-lg border border-secondary-subtle
                p-5 rounded-5">
        
            <form onsubmit=" event.preventDefault()"
            class="h-100 d-flex flex-column justify-content-around align-items-center">

                <h2 class="align-self-center">Cadastro</h2>

                    <input type="email" placeholder="Insira seu email" id="signUpEmail"
                            class="bg-transparent border-0 border-bottom border-dark-subtle w-100">

                <div class="w-100">
                    <input type="password" placeholder="Insira sua senha" id="signUpPassword"
                        class="bg-transparent border-0 border-bottom border-dark-subtle w-100">
                    
                    <div class="form-check form-switch mt-2">
                        <input class="form-check-input" type="checkbox" role="switch" id="showPassword"
                            onchange="
                                const passwordInput = document.getElementById('signUpPassword');
                                
                                passwordInput.type = (this.checked) ? 'text' : 'password';">
                        <label class="form-check-label" for="showPassword">Mostrar senha</label>
                    </div>
                </div>

                <button class="w-50 align-self-center btn btn-dark"
                        onclick="CreateUser('signUpEmail', 'signUpPassword')"> Cadastrar-se</button>
            
            </form>

            <h6 class="text-center">Já tem uma conta? <a href="index.html">Faça login</a></h6>
        </main>
    </div>

    <script src="app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
