<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Horizon</title>
</head>
<body>
    <main>
        <div>
            <h2>Cadastro</h2>

            <input placeholder="JWT Token" id="jwtToken"/>

            <input type="text" placeholder="Email" id="userEmail">
            <input type="text" placeholder="Senha" id="userPassword">

            <button>Visualizar senha</button>

            <button onclick="AddUser()">Cadastrar</button>
        </div>
        
        <div>
            <h2>Login</h2>

            <input type="text" placeholder="Email" id="userEmail2">
            <input type="text" placeholder="Senha" id="userPassword2">

            <button>Visualizar senha</button>

            <button>Login</button>
        </div>

        <br />
        <br />
        <br />

        <div>
            <button class="" onclick="ShowUsers()">Atualizar Lista de Users</button>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Email</th>
                        <th>Senha</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                </tbody>
            </table>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
