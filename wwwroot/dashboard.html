<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Horizon</title>
    <link rel="stylesheet" href="reset.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <script>
        const token = localStorage.getItem('token');
        if (token == null)
            window.location.href = '/index.html';
    </script>
</head>
<body class="d-flex flex-column align-items-center justify-content-center
             vw-100 vh-100 bg-dark-subtle">


    <main class="w-100 h-100 d-flex flex-column justify-content-center">
        
        <section class="w-25 h-50 d-flex flex-column justify-self-center align-self-center">
            <button class="w-50 align-self-center btn btn-dark" 
                    onclick="ShowUsers()">Atualizar Lista de Users</button>
            
            <table class="mt-4 align-self-center table border border-dark-subtle rounded-5">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Email</th>
                        <th>Senha</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                </tbody>
            </table>
        </section>

        <section class="w-25 d-flex flex-column justify-self-center align-self-center">
            
            <div class="h-50 d-flex flex-row justify-content-center">
                <input type="text" placeholder="JWT Token" id="jwtToken"
                       class="bg-transparent border-0 border-bottom border-dark-subtle mb-3">
                <button class="h-75">Verificar Token</button>
            </div>

            <div class="btn-group" role="group" aria-label="Basic mixed styles example">
                <button type="button" class="btn btn-danger" data-bs-toggle="modal" data-bs-target="#deleteModal">Delete</button>
                <button type="button" class="btn btn-warning">Update</button>
                <button type="button" class="btn btn-success">Create</button>
            </div>

            <div class="modal fade" id="deleteModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
                <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h1 class="modal-title fs-5" id="exampleModalLabel">Delete User</h1>
                        </div>
                        <div class="modal-body d-flex flex-column align-items-center">
                            <label>Digite o Id do usuário que deseja apagar:</label>
                            <input id="userIdInput" type="text" placeholder="Id" class="bg-transparent border-0 border-bottom border-dark-subtle">
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                            <button type="button" class="btn btn-primary" onclick="DeleteUser()">Save changes</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="app.js"></script>
</body>
</html>
